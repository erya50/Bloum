services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloum
      POSTGRES_PASSWORD: bloum
      POSTGRES_DB: bloum
    ports:
      - "5432:5432"
    volumes:
      - bloum_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bloum
      MINIO_ROOT_PASSWORD: bloum-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bloum_minio:/data

volumes:
  bloum_pgdata:
  bloum_minio:
